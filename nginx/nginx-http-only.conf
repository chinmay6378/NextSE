# ── Temporary HTTP-only config ─────────────────────────────────────────────────
# Use this BEFORE you have an SSL certificate.
# Step 1: copy this to nginx/nginx.conf, start services, run init-ssl.sh
# Step 2: replace nginx/nginx.conf with the HTTPS version, then: docker compose restart nginx

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    client_max_body_size 50M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }
}
